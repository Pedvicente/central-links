<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clube Duratex - Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-navy: #000839;
            --card-gray: #222222;
            --btn-blue: #0d3b85; /* Azul padrão da imagem */
            --btn-hover: #144eb1;
            --accent-blue: #7c92ff;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-navy);
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-gray);
            width: 92%;
            max-width: 400px;
            min-height: 600px;
            padding: 40px 20px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
            margin: 20px auto;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Animação de troca de tela */
        .page {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .page.active {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Estilo do Logo */
        .logo-area {
            margin-bottom: 30px;
            flex-shrink: 0;
        }

        .logo-text {
            color: #ffffff;
            font-size: 32px;
            font-weight: bold;
            line-height: 0.9;
            border-left: 4px solid var(--accent-blue);
            border-bottom: 4px solid var(--accent-blue);
            display: inline-block;
            padding: 10px 20px;
            text-transform: lowercase;
        }

        .logo-text span {
            display: block;
            color: var(--accent-blue);
        }

        /* Botões Padronizados */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .link-button {
            background-color: var(--btn-blue);
            color: white;
            text-decoration: none;
            padding: 16px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            font-size: 16px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }

        .link-button:hover {
            background-color: var(--btn-hover);
        }

        .link-button:active {
            transform: scale(0.98);
        }

        .link-button i {
            margin-right: 15px;
            font-size: 20px;
            width: 25px;
            text-align: center;
        }

        /* Navegação Interna */
        .btn-back {
            color: var(--accent-blue);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 0;
            text-transform: uppercase;
            font-weight: bold;
        }

        h2 {
            color: white;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0 0 20px 0;
        }

        .footer-text {
            margin-top: auto;
            padding-top: 40px;
            color: #666;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="home" class="page active">
            <div class="logo-area">
                <div class="logo-text">Clube<br><span>Duratex</span></div>
            </div>

            <div class="links-container">
                <button onclick="showPage('instrutores')" class="link-button">
                    <i class="fab fa-instagram"></i> INSTAGRAM INSTRUTORES
                </button>

                <a href="https://www.clubeduratex.com.br/" class="link-button" target="_blank">
                    <i class="fas fa-mobile-alt"></i> Clube duratex app
                </a>

                <a href="https://www.clubeduratex.com.br/" class="link-button" target="_blank">
                    <i class="far fa-file-alt"></i> Clube duratex blog
                </a>

                <a href="https://www.clubeduratex.com.br/politicas-de-privacidade-2/" class="link-button" target="_blank">
                    <i class="fas fa-gavel"></i> Normas e Diretrizes
                </a>

                <a href="#" class="link-button">
                    <i class="far fa-comment-dots"></i> Fale com o clube
                </a>
            </div>
        </div>

        <div id="instrutores" class="page">
            <button onclick="showPage('home')" class="btn-back">
                <i class="fas fa-chevron-left"></i> VOLTAR
            </button>

            <div class="logo-area">
                <div class="logo-text">clube<br><span>duratex</span></div>
            </div>

            <h2>Instrutores</h2>

            <div class="links-container">
                <a href="https://www.instagram.com/gabriel.dexco?igsh=OWZidmZ2NmdkYWFk" class="link-button" target="_blank">
                    <i class="fab fa-instagram"></i> Gabriel Carvalho
                </a>

                <a href="https://www.instagram.com/indiara.dexco?igsh=eXV5b3E3eG80eHJz" class="link-button" target="_blank">
                    <i class="fab fa-instagram"></i> Indiara Peres
                </a>

                <a href="https://www.instagram.com/lucianolima.dexco?igsh=MTJuMW85YnN2ZmF0dA==" class="link-button" target="_blank">
                    <i class="fab fa-instagram"></i> Luciano Lima
                </a>

                <a href="https://www.instagram.com/pedro.dexco?igsh=ZjQxem8ycjl1djdx" class="link-button" target="_blank">
                    <i class="fab fa-instagram"></i> Pedro Vicente
                </a>
            </div>
        </div>

        <div class="footer-text">
            CLUBE DURATEX • TREINAMENTO TÉCNICO
        </div>
    </div>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>

</body>
</html>
